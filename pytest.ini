[pytest]
markers =
    unit: marks tests as unit tests (fast, no I/O)
    contract: marks tests as contract tests (for data schemas and contracts)
    integration: marks tests as integration tests (may involve I/O)
    e2e: marks tests as end-to-end tests (full workflow simulation)
    docs: marks tests as documentation sync tests
    slow: marks tests as slow running tests, skipped by default
