# Política de Retenção de Logs - M2-026.5
# Governa rotação, compressão e limpeza determinística de logs

retention_policies:
  CRITICAL:
    days: 365
    compress: true
    archive_format: gz
    description: "Logs críticos retidos por 1 ano (compliance + auditoria)"

  ERROR:
    days: 90
    compress: true
    archive_format: gz
    description: "Logs de erro retidos por 90 dias"

  WARN:
    days: 14
    compress: false
    archive_format: gz
    description: "Logs de aviso retidos por 14 dias"

  INFO:
    days: 7
    compress: false
    archive_format: gz
    description: "Logs informativos retidos por 7 dias"

rotation:
  max_size_mb: 100
  compress_format: gz
  description: "Rotação quando arquivo exceder 100MB"

scheduler:
  enabled: true
  hour_utc: 3
  deterministic: true
  description: "Limpeza automática diária às 3:00 UTC"

# Versionamento para tracking de mudanças
version: "1.0"
last_updated: "2026-03-23"
