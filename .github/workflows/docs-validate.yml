name: Docs Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-validate.yml"
      - ".githooks/pre-commit"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-validate.yml"
      - ".githooks/pre-commit"

jobs:
  markdown-lint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Rodar markdownlint
        run: |
          markdownlint \
            --config .markdownlintrc.json \
            docs/**/*.md \
            README.md \
            2>&1 | tee markdown-report.txt

      - name: Upload markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-lint-report
          path: markdown-report.txt

  python-docstring-check:
    name: Python Docstring Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verificar docstrings (agent/, execution/, risk/, backtest/)
        run: |
          MISSING_DOCSTRINGS=0

          for dir in agent execution risk backtest; do
            if [ -d "$dir" ]; then
              for file in $(find "$dir" -name "*.py" -type f | grep -v test | grep -v __pycache__); do
                lines=$(wc -l < "$file")
                if [ "$lines" -gt 20 ]; then
                  head -n 5 "$file" | grep -q '"""' || {
                    echo "Docstring faltando: $file"
                    MISSING_DOCSTRINGS=$((MISSING_DOCSTRINGS + 1))
                  }
                fi
              done
            fi
          done

          if [ "$MISSING_DOCSTRINGS" -gt 0 ]; then
            echo "$MISSING_DOCSTRINGS arquivo(s) com docstring faltando."
            exit 1
          fi

  sync-tag-requirement:
    name: [SYNC] Tag Requirement
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar [SYNC] em commits com docs
        run: |
          MERGE_BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
          COMMITS=$(git rev-list "$MERGE_BASE"..HEAD)
          MISSING_SYNC=0

          for commit in $COMMITS; do
            MSG=$(git log -1 --format=%B "$commit")
            CRITICAL=$(git diff-tree --no-commit-id --name-only -r "$commit" | \
              grep -E '(^docs/|^README\.md$|^\.github/workflows/docs-validate\.yml$|^\.githooks/pre-commit$)' || true)

            if [ -n "$CRITICAL" ]; then
              if ! echo "$MSG" | grep -q "\[SYNC\]"; then
                echo "Commit sem [SYNC]: $commit"
                MISSING_SYNC=$((MISSING_SYNC + 1))
              fi
            fi
          done

          if [ "$MISSING_SYNC" -gt 0 ]; then
            echo "$MISSING_SYNC commit(s) sem tag [SYNC]."
            exit 1
          fi

  encoding-check:
    name: UTF-8 Encoding Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar UTF-8 em docs e README
        run: |
          INVALID_ENCODING=0

          for file in $(find docs -name "*.md"; echo README.md); do
            if ! iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1; then
              echo "Encoding inválido: $file"
              INVALID_ENCODING=$((INVALID_ENCODING + 1))
            fi
          done

          if [ "$INVALID_ENCODING" -gt 0 ]; then
            echo "$INVALID_ENCODING arquivo(s) com encoding inválido."
            exit 1
          fi

  report:
    name: Docs Validation Report
    runs-on: ubuntu-latest
    if: always()
    needs: [markdown-lint, python-docstring-check, encoding-check]
    steps:
      - name: Check results
        run: |
          echo "Markdownlint: ${{ needs.markdown-lint.result }}"
          echo "Python Docstrings: ${{ needs.python-docstring-check.result }}"
          echo "UTF-8 Encoding: ${{ needs.encoding-check.result }}"

          if [ "${{ needs.markdown-lint.result }}" = "failure" ] || \
             [ "${{ needs.python-docstring-check.result }}" = "failure" ] || \
             [ "${{ needs.encoding-check.result }}" = "failure" ]; then
            exit 1
          fi
